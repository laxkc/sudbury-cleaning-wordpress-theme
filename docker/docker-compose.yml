services:
  wordpress:
    image: blitvin/wordpress-postgresql:v1.0.0-wp6.9-pg4wp3.4.1-php8.3.27
    container_name: wp_app
    command: ["php", "-S", "0.0.0.0:80", "-t", "/var/www/html", "/workspace/router.php"]
    restart: unless-stopped
    ports:
      - "8080:80"
    environment:
      WORDPRESS_DB_HOST: host.docker.internal:5432
      WORDPRESS_DB_USER: postgres
      WORDPRESS_DB_PASSWORD: postgres
      WORDPRESS_DB_NAME: prox
    volumes:
      - ./wp-content:/var/www/html/wp-content
      - ./router.php:/workspace/router.php:ro

  adminer:
    image: adminer:latest
    container_name: wp_adminer
    restart: unless-stopped
    ports:
      - "8083:8080"
    environment:
      ADMINER_DEFAULT_SERVER: host.docker.internal
